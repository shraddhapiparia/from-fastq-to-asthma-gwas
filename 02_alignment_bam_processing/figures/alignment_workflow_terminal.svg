<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400">
  <rect width="100%" height="100%" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="20" y="40" font-size="18" font-weight="bold" fill="#222">Alignment Workflow (Terminal)</text>
  <text x="20" y="80" font-size="12" fill="#666" font-family="monospace">$ bash scripts/run_alignment.sh refs/toy_reference.fa \</text>
  <text x="20" y="100" font-size="12" fill="#666" font-family="monospace">  ../01_fastq_qc/data/NA12878_small_R1.fastq.gz \</text>
  <text x="20" y="120" font-size="12" fill="#666" font-family="monospace">  results/sample_unsorted.bam -t 4</text>
  <text x="20" y="150" font-size="12" fill="#333" font-family="monospace">Running bwa mem -> SAM -> BAM (unsorted)</text>
  <text x="20" y="170" font-size="12" fill="#333" font-family="monospace">Wrote unsorted BAM: results/sample_unsorted.bam</text>
  <text x="20" y="200" font-size="12" fill="#666" font-family="monospace">$ bash scripts/process_bam.sh results/sample_unsorted.bam \</text>
  <text x="20" y="220" font-size="12" fill="#666" font-family="monospace">  results/processed -t 4</text>
  <text x="20" y="250" font-size="12" fill="#333" font-family="monospace">Sorting BAM -> results/processed/sample_unsorted.sorted.bam</text>
  <text x="20" y="270" font-size="12" fill="#333" font-family="monospace">Indexing sorted BAM</text>
  <text x="20" y="290" font-size="12" fill="#333" font-family="monospace">Marking duplicates (Picard) -> sample_unsorted.dedup.bam</text>
  <text x="20" y="310" font-size="12" fill="#333" font-family="monospace">Generating flagstat -> sample_unsorted.flagstat.txt</text>
  <text x="20" y="330" font-size="12" fill="#333" font-family="monospace">Processing complete. Outputs in: results/processed</text>
